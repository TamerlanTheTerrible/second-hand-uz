spring:
  application:
    name: second-hand-uz
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/secondhanduz}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    me.timur.secondhanduz: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:SecretKeyThatMustBeChangedInProduction-AtLeast256BitsLongForSecurity}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  upload:
    path: ${UPLOAD_PATH:./uploads}
  atmos:
    base-url: ${ATMOS_BASE_URL:https://partner.atmos.uz}
    store-id: ${ATMOS_STORE_ID:}
    consumer-key: ${ATMOS_CONSUMER_KEY:}
    consumer-secret: ${ATMOS_CONSUMER_SECRET:}
    webhook-secret: ${ATMOS_WEBHOOK_SECRET:change-me}
  rate-limit:
    capacity: 100
    refill-period-seconds: 60
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
