version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: secondhanduz-postgres
    environment:
      POSTGRES_DB: secondhanduz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: secondhanduz-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/secondhanduz
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
      ATMOS_BASE_URL: ${ATMOS_BASE_URL:-https://partner.atmos.uz}
      ATMOS_STORE_ID: ${ATMOS_STORE_ID:-}
      ATMOS_CONSUMER_KEY: ${ATMOS_CONSUMER_KEY:-}
      ATMOS_CONSUMER_SECRET: ${ATMOS_CONSUMER_SECRET:-}
      ATMOS_WEBHOOK_SECRET: ${ATMOS_WEBHOOK_SECRET:-change-me}
      UPLOAD_PATH: /app/uploads
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
